<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>
<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:black;
color:white;
overflow:hidden;
}
#countdown{margin-top:150px;font-size:40px;}
button{padding:12px 25px;font-size:18px;margin:10px;border:none;border-radius:10px;cursor:pointer;}
#yes{background:#00c853;color:white;}
#no{background:#ff1744;color:white;}
#surprise{display:none;margin-top:40px;}
#messageBox{display:none;margin-top:30px;font-size:28px;}
img{width:300px;border-radius:15px;margin-top:20px;display:none;}
.balloon{position:absolute;bottom:-100px;width:40px;height:60px;border-radius:50%;animation:float 8s linear infinite;}
@keyframes float{0%{transform:translateY(0);}100%{transform:translateY(-120vh);}}
.star{position:absolute;width:2px;height:2px;background:white;animation:twinkle 2s infinite;}
@keyframes twinkle{0%{opacity:0.2}50%{opacity:1}100%{opacity:0.2}}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;}
</style>
</head>
<body>
<h1>🎉 Happy Birthday, <span id="name"></span>! 🎂</h1>
<p id="birthday-time">Birthday starts on 8 April 2026 12:00 AM</p>
<div id="countdown">Loading countdown...</div>
<div id="surprise">
<h2>Ready for a surprise? 🎁</h2>
<button id="yes" onclick="startSurprise()">Yes</button>
<button id="no" onclick="moveButton()">No</button>
</div>
<div id="messageBox">
<p id="message"></p>
</div>
<canvas id="fireworks"></canvas>

<script>

/* ===== SETTINGS ===== */
const NAME = "Haniaaa"; 
const messages = [
"Happy Birthday! 🎂",
"To my online friend. We met through screens and words without knowing how important you would become. No shared photos, no familiar faces — just conversations that slowly turned into comfort. 🥹❤️",
"Thank you for the laughs, the random talks and the quiet support. 💟💎",
"Once again HAPPY BIRTHDAY TO MY MONKEY. 🐒 I want to tell you that you're very lucky because you have me... 😜",
"You may be an online friend but the bond we share is genuine and that's enough. 🫶🏻💐"
];

document.getElementById("name").innerText = NAME;

/* countdown */
const birthday = new Date(2026, 3, 8, 0, 0, 0);
const countdownEl = document.getElementById("countdown");
function updateCountdown(){
  const now = new Date();
  const diff = birthday - now;
  if(diff <= 0){
    countdownEl.style.display = "none";
    document.getElementById("surprise").style.display = "block";
    return;
  }
  const days = Math.floor(diff/(1000*60*60*24));
  const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const minutes = Math.floor((diff%(1000*60*60))/(1000*60));
  const seconds = Math.floor((diff%(1000*60))/1000);
  countdownEl.textContent = `Countdown: ${days}d ${hours}h ${minutes}m ${seconds}s`;
}
setInterval(updateCountdown,1000);
updateCountdown();

/* No button */
function moveButton(){
  let btn = document.getElementById("no");
  btn.style.position = "absolute";
  btn.style.left = Math.random()*80 + "%";
  btn.style.top = Math.random()*80 + "%";
}

/* Surprise */
let index = 0;
let photoIndex = 0;

function startSurprise(){
  document.getElementById("surprise").style.display = "none";
  document.getElementById("messageBox").style.display = "block"; 
  showMessages();
  createBalloons();
  startFireworks();
}

/* Show multiple messages */
function showMessages(){
  if(index < messages.length){
    document.getElementById("message").innerText = messages[index];
    index++;
    setTimeout(showMessages, 3000);
  }
}

/* Balloons */
function createBalloons(){
  for(let i=0;i<20;i++){
    let balloon = document.createElement("div");
    balloon.className = "balloon";
    balloon.style.left = Math.random()*100+"%";
    balloon.style.background = "hsl("+Math.random()*360+",70%,60%)";
    document.body.appendChild(balloon);
  }
}

/* Stars */
for(let i=0;i<150;i++){
  let star = document.createElement("div");
  star.className = "star";
  star.style.left = Math.random()*100+"%";
  star.style.top = Math.random()*100+"%";
  document.body.appendChild(star);
}

/* Fireworks */
function startFireworks(){
  let canvas = document.getElementById("fireworks");
  let ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  setInterval(function(){
    let x = Math.random()*canvas.width;
    let y = Math.random()*canvas.height/2;
    for(let i=0;i<50;i++){
      ctx.fillStyle = "hsl("+Math.random()*360+",100%,50%)";
      ctx.beginPath();
      ctx.arc(x+(Math.random()*100-50),y+(Math.random()*100-50),3,0,Math.PI*2);
      ctx.fill();
    }
    setTimeout(()=>ctx.clearRect(0,0,canvas.width,canvas.height),500);
  },800);
}

</script>
</body>
  </html>
